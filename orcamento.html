<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informe de Diagnóstico</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #16a34a; --green-light: #f0fdf4; --green-border: #86efac;
    --red: #dc2626; --red-light: #fef2f2; --red-border: #fca5a5;
    --orange: #d97706; --orange-light: #fffbeb; --orange-border: #fcd34d;
    --blue: #2563eb; --blue-light: #eff6ff;
    --border: #e5e7eb; --bg: #f9fafb;
    --card: #ffffff; --text: #111827; --text-muted: #6b7280;
    --radius: 14px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto; }

  .header { background: #fff; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-icon { width: 38px; height: 38px; background: var(--green-light); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .header-taller { font-size: 15px; font-weight: 700; }
  .header-ciudad { font-size: 12px; color: var(--text-muted); }

  .hero { padding: 24px 20px 16px; }
  .hero-eyebrow { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .hero-nombre { font-size: 30px; font-weight: 800; margin-bottom: 12px; }
  .hero-tags { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .tag-placa { background: #1e293b; color: #fff; font-size: 13px; font-weight: 700; padding: 5px 12px; border-radius: 8px; letter-spacing: 1px; }
  .tag-vehiculo { font-size: 14px; color: var(--text-muted); font-weight: 500; }

  .contadores { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px 20px; }
  .contador { border-radius: var(--radius); padding: 18px 16px; text-align: center; }
  .contador-urgente { background: var(--red-light); border: 1px solid var(--red-border); }
  .contador-vigilar { background: var(--orange-light); border: 1px solid var(--orange-border); }
  .contador-num { font-size: 40px; font-weight: 900; line-height: 1; }
  .contador-urgente .contador-num { color: var(--red); }
  .contador-vigilar .contador-num { color: var(--orange); }
  .contador-label { font-size: 13px; font-weight: 600; margin-top: 4px; }
  .contador-urgente .contador-label { color: var(--red); }
  .contador-vigilar .contador-label { color: var(--orange); }

  .progreso-wrap { padding: 0 20px 16px; }
  .progreso-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .progreso-bar { height: 5px; background: var(--border); border-radius: 3px; }
  .progreso-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }

  .section-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 4px 20px 12px; }

  /* ITEM CARD */
  .item-card { background: #fff; border-radius: var(--radius); margin: 0 20px 16px; overflow: hidden; border: 1.5px solid var(--border); transition: border-color 0.2s, box-shadow 0.2s; }
  .item-card.urgente { border-left: 4px solid var(--red); }
  .item-card.vigilar { border-left: 4px solid var(--orange); }
  .item-card.selecionado-aprovar { border-color: var(--green-border); box-shadow: 0 0 0 3px rgba(22,163,74,0.1); }
  .item-card.selecionado-recusar { border-color: var(--red-border); box-shadow: 0 0 0 3px rgba(220,38,38,0.1); }

  .item-body { padding: 16px; }
  .item-header-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .item-titulo { font-size: 15px; font-weight: 700; flex: 1; text-transform: uppercase; letter-spacing: 0.3px; }
  .urg-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
  .urg-urgente { background: var(--red-light); color: var(--red); }
  .urg-recomendado { background: var(--orange-light); color: var(--orange); }
  .urg-normal { background: var(--green-light); color: var(--green); }

  .item-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 4px; }

  .item-foto { width: 100%; max-height: 220px; object-fit: cover; display: block; cursor: pointer; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

  .audio-item { padding: 12px 16px; background: var(--blue-light); border-top: 1px solid var(--border); }
  .audio-item-label { font-size: 11px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .audio-item audio { width: 100%; }

  .item-precio { padding: 14px 16px; border-top: 1px solid var(--border); }
  .precio-valor { font-size: 26px; font-weight: 900; }
  .precio-iva { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* BOTONES SELECCIÓN */
  .item-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); }
  .btn-sel { padding: 12px 8px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; border: 2px solid transparent; }
  .btn-sel-aprovar { background: var(--green-light); color: var(--green); border-color: var(--green-border); }
  .btn-sel-aprovar:hover { background: #dcfce7; }
  .btn-sel-aprovar.activo { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-sel-recusar { background: var(--red-light); color: var(--red); border-color: var(--red-border); }
  .btn-sel-recusar:hover { background: #fee2e2; }
  .btn-sel-recusar.activo { background: var(--red); color: #fff; border-color: var(--red); }

  /* CAMPO MOTIVO INLINE */
  .motivo-box { display: none; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--red-light); }
  .motivo-box.show { display: block; }
  .motivo-box label { font-size: 12px; font-weight: 700; color: var(--red); display: block; margin-bottom: 8px; }
  .motivo-box textarea { width: 100%; border: 1.5px solid var(--red-border); border-radius: 8px; padding: 10px; font-size: 14px; resize: none; min-height: 80px; font-family: inherit; outline: none; background: #fff; }
  .motivo-box textarea:focus { border-color: var(--red); }

  /* RESUMEN */
  .resumen { background: #fff; border-radius: var(--radius); margin: 0 20px 16px; border: 1px solid var(--border); overflow: hidden; }
  .resumen-row { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text-muted); }
  .resumen-row:last-child { border-bottom: none; }
  .resumen-total-row { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--bg); }
  .resumen-total-label { font-size: 15px; font-weight: 700; }
  .resumen-total-valor { font-size: 28px; font-weight: 900; }

  .footer-cta { padding: 16px 20px 32px; }
  .btn-confirmar { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-confirmar.enabled { background: var(--green); color: #fff; }
  .btn-confirmar.enabled:hover { background: #15803d; }
  .btn-confirmar.disabled { background: #e5e7eb; color: var(--text-muted); cursor: not-allowed; }

  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 999; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
  .lightbox-close { position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; background: rgba(255,255,255,0.15); border: none; border-radius: 50%; color: #fff; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .confirmado { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; gap: 14px; min-height: 80vh; }
  .confirmado.show { display: flex; }
  .confirmado-icon { font-size: 72px; }
  .confirmado h2 { font-size: 24px; font-weight: 800; }
  .confirmado p { color: var(--text-muted); font-size: 15px; max-width: 280px; line-height: 1.6; }

  .obs-box { margin: 0 20px 20px; background: var(--green-light); border: 1px solid var(--green-border); border-radius: var(--radius); padding: 14px 16px; font-size: 14px; color: #166534; line-height: 1.6; }
  .obs-box::before { content: "✓ "; font-weight: 700; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 9999; display: none; white-space: nowrap; }
  .toast.show { display: block; }
</style>
</head>
<body>

<script>
const SUPABASE_URL = 'https://afaovhhtrrfmdyqxxkdy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmYW92aGh0cnJmbWR5cXh4a2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNjA1MjYsImV4cCI6MjA5NjczNjUyNn0.tCdeOxprpPwbJLchm65tC5TQU2rIw8UQht6LJNoEgyk';
const IVA = 0.21;
</script>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="">
</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p style="color:var(--text-muted);font-size:14px">Cargando informe...</p>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="header-left">
      <div class="header-icon">🔧</div>
      <div>
        <div class="header-taller" id="h-oficina">Taller</div>
        <div class="header-ciudad">España</div>
      </div>
    </div>
  </div>

  <div class="hero">
    <div class="hero-eyebrow">Informe de diagnóstico</div>
    <div class="hero-nombre" id="h-cliente"></div>
    <div class="hero-tags">
      <span class="tag-placa" id="h-placa"></span>
      <span class="tag-vehiculo" id="h-vehiculo"></span>
    </div>
  </div>

  <div class="contadores">
    <div class="contador contador-urgente">
      <div class="contador-num" id="cnt-urgente">0</div>
      <div class="contador-label">Urgente</div>
    </div>
    <div class="contador contador-vigilar">
      <div class="contador-num" id="cnt-vigilar">0</div>
      <div class="contador-label">Vigilar</div>
    </div>
  </div>

  <div class="progreso-wrap">
    <div class="progreso-info">
      <span id="prog-label">0 de 0 elementos revisados</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progreso-bar"><div class="progreso-fill" id="progreso-fill" style="width:0%"></div></div>
  </div>

  <div class="section-label">Qué hemos encontrado</div>
  <div id="itens-container"></div>

  <div id="obs-section" style="display:none">
    <div class="obs-box" id="obs-text"></div>
  </div>

  <div class="section-label" style="padding-top:20px">Resumen</div>
  <div class="resumen" id="resumen-container"></div>

  <div class="footer-cta">
    <button class="btn-confirmar disabled" id="btn-confirmar" onclick="confirmarTodo()">
      Revisa todos los elementos para confirmar
    </button>
  </div>

  <div class="confirmado" id="confirmado">
    <div class="confirmado-icon">✅</div>
    <h2>¡Respuesta enviada!</h2>
    <p>El taller ha recibido tu aprobación y se pondrá en contacto contigo pronto.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let presupuesto = null;
let items = [];
// selecciones: { [itemId]: { decision: 'aprovar'|'recusar'|null, motivo: string } }
let selecciones = {};

async function init() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (!token) return showError('Enlace inválido o expirado.');

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/orcamentos?link_token=eq.${token}&select=*`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
    });
    const data = await res.json();
    if (!data || data.length === 0) return showError('Presupuesto no encontrado.');
    presupuesto = data[0];

    const resItems = await fetch(`${SUPABASE_URL}/rest/v1/itens_orcamento?orcamento_id=eq.${presupuesto.id}&order=ordem.asc`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
    });
    items = await resItems.json();

    // Inicializa selecciones com respostas já salvas
    items.forEach(item => {
      if (item.aprovado !== null && item.aprovado !== undefined) {
        selecciones[item.id] = {
          decision: item.aprovado ? 'aprovar' : 'recusar',
          motivo: item.motivo_recusa || ''
        };
      } else {
        selecciones[item.id] = { decision: null, motivo: '' };
      }
    });

    if (presupuesto.status === 'pendente') {
      await fetch(`${SUPABASE_URL}/rest/v1/orcamentos?id=eq.${presupuesto.id}`, {
        method: 'PATCH',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'visualizado' })
      });
    }

    renderPage();
  } catch(e) {
    showError('Error al cargar el informe.');
  }
}

function renderPage() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  document.getElementById('h-oficina').textContent = presupuesto.oficina_nome || 'Taller';
  document.getElementById('h-cliente').textContent = 'Hola, ' + presupuesto.cliente_nome;
  document.getElementById('h-placa').textContent = presupuesto.veiculo_placa;
  document.getElementById('h-vehiculo').textContent = `${presupuesto.veiculo_marca} ${presupuesto.veiculo_modelo}${presupuesto.veiculo_ano ? ' (' + presupuesto.veiculo_ano + ')' : ''}`;

  document.getElementById('cnt-urgente').textContent = items.filter(i => i.urgencia === 'urgente').length;
  document.getElementById('cnt-vigilar').textContent = items.filter(i => i.urgencia === 'recomendado').length;

  if (presupuesto.observacoes) {
    document.getElementById('obs-section').style.display = 'block';
    document.getElementById('obs-text').textContent = presupuesto.observacoes;
  }

  renderItems();
  actualizarResumen();
  actualizarProgreso();
}

function renderItems() {
  const c = document.getElementById('itens-container');
  c.innerHTML = '';

  items.forEach(item => {
    const sel = selecciones[item.id];
    const urgMap = {
      urgente: ['urg-urgente', 'URGENTE', 'urgente'],
      recomendado: ['urg-recomendado', 'VIGILAR', 'vigilar'],
      normal: ['urg-normal', 'NORMAL', '']
    };
    const [urgClass, urgLabel, cardClass] = urgMap[item.urgencia] || urgMap.normal;
    const precio = (parseFloat(item.valor_pecas) || 0) + (parseFloat(item.valor_mao_obra) || 0);
    const precioIVA = precio * (1 + IVA);

    const cardSelClass = sel.decision === 'aprovar' ? 'selecionado-aprovar' : sel.decision === 'recusar' ? 'selecionado-recusar' : '';
    const btnAprovarActivo = sel.decision === 'aprovar' ? 'activo' : '';
    const btnRecusarActivo = sel.decision === 'recusar' ? 'activo' : '';
    const motivoShow = sel.decision === 'recusar' ? 'show' : '';

    const div = document.createElement('div');
    div.className = `item-card ${cardClass} ${cardSelClass}`;
    div.id = 'icard_' + item.id;

    const fotoHtml = item.foto_url
      ? `<img class="item-foto" src="${item.foto_url}" alt="Foto" onclick="openLightbox('${item.foto_url}')">`
      : '';

    const audioHtml = item.audio_url
      ? `<div class="audio-item">
           <div class="audio-item-label">🎙 Escucha el informe</div>
           <audio controls src="${item.audio_url}"></audio>
         </div>`
      : '';

    div.innerHTML = `
      <div class="item-body">
        <div class="item-header-row">
          <div class="item-titulo">${item.titulo}</div>
          <span class="urg-badge ${urgClass}">${urgLabel}</span>
        </div>
        ${item.descricao ? `<div class="item-desc">${item.descricao}</div>` : ''}
      </div>
      ${fotoHtml}
      ${audioHtml}
      <div class="item-precio">
        <div class="precio-valor">€${precio.toFixed(2)}</div>
        <div class="precio-iva">sin IVA · €${precioIVA.toFixed(2)} con IVA</div>
      </div>
      <div class="item-btns">
        <button class="btn-sel btn-sel-aprovar ${btnAprovarActivo}" id="btnapr_${item.id}" onclick="toggleAprovar('${item.id}')">
          ✓ Aprobar
        </button>
        <button class="btn-sel btn-sel-recusar ${btnRecusarActivo}" id="btnrec_${item.id}" onclick="toggleRecusar('${item.id}')">
          ✕ Rechazar
        </button>
      </div>
      <div class="motivo-box ${motivoShow}" id="motivo_${item.id}">
        <label>Motivo del rechazo (opcional)</label>
        <textarea id="motivo-text_${item.id}" placeholder="Ej: Lo haré en otro momento, precio elevado..." oninput="guardarMotivo('${item.id}')">${sel.motivo || ''}</textarea>
      </div>`;

    c.appendChild(div);
  });
}

function toggleAprovar(itemId) {
  const sel = selecciones[itemId];
  // Se já está aprovado, deseleciona
  if (sel.decision === 'aprovar') {
    sel.decision = null;
  } else {
    sel.decision = 'aprovar';
    sel.motivo = '';
  }
  atualizarUIItem(itemId);
  actualizarResumen();
  actualizarProgreso();
}

function toggleRecusar(itemId) {
  const sel = selecciones[itemId];
  // Se já está recusado, deseleciona
  if (sel.decision === 'recusar') {
    sel.decision = null;
  } else {
    sel.decision = 'recusar';
  }
  atualizarUIItem(itemId);
  actualizarResumen();
  actualizarProgreso();
}

function guardarMotivo(itemId) {
  selecciones[itemId].motivo = document.getElementById('motivo-text_' + itemId)?.value || '';
}

function atualizarUIItem(itemId) {
  const sel = selecciones[itemId];
  const card = document.getElementById('icard_' + itemId);
  const btnApr = document.getElementById('btnapr_' + itemId);
  const btnRec = document.getElementById('btnrec_' + itemId);
  const motivoBox = document.getElementById('motivo_' + itemId);

  card.classList.remove('selecionado-aprovar', 'selecionado-recusar');
  btnApr.classList.remove('activo');
  btnRec.classList.remove('activo');
  motivoBox.classList.remove('show');

  if (sel.decision === 'aprovar') {
    card.classList.add('selecionado-aprovar');
    btnApr.classList.add('activo');
  } else if (sel.decision === 'recusar') {
    card.classList.add('selecionado-recusar');
    btnRec.classList.add('activo');
    motivoBox.classList.add('show');
  }
}

async function confirmarTodo() {
  const btn = document.getElementById('btn-confirmar');
  if (btn.classList.contains('disabled')) return;
  btn.textContent = 'Enviando...';
  btn.disabled = true;

  try {
    // Salva cada item no Supabase
    for (const item of items) {
      const sel = selecciones[item.id];
      const motivo = document.getElementById('motivo-text_' + item.id)?.value?.trim() || sel.motivo || null;
      await fetch(`${SUPABASE_URL}/rest/v1/itens_orcamento?id=eq.${item.id}`, {
        method: 'PATCH',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          aprovado: sel.decision === 'aprovar',
          aprovado_em: new Date().toISOString(),
          motivo_recusa: sel.decision === 'recusar' ? (motivo || 'No indicado') : null
        })
      });
    }

    // Atualiza status do orçamento
    const aprobados = Object.values(selecciones).filter(s => s.decision === 'aprovar').length;
    const total = items.length;
    const nuevoStatus = aprobados === total ? 'aprovado_total' : aprobados === 0 ? 'recusado' : 'aprovado_parcial';

    await fetch(`${SUPABASE_URL}/rest/v1/orcamentos?id=eq.${presupuesto.id}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: nuevoStatus })
    });

    document.getElementById('app').style.display = 'none';
    document.getElementById('confirmado').classList.add('show');
  } catch(e) {
    toast('Error al enviar. Inténtalo de nuevo.');
    btn.textContent = 'Confirmar mi respuesta ✓';
    btn.disabled = false;
  }
}

function actualizarResumen() {
  const aprobadosIds = Object.entries(selecciones).filter(([,s]) => s.decision === 'aprovar').map(([k]) => k);
  const itemsAprobados = items.filter(it => aprobadosIds.includes(it.id));
  const subtotal = itemsAprobados.reduce((a, it) => a + (parseFloat(it.valor_pecas) || 0) + (parseFloat(it.valor_mao_obra) || 0), 0);
  const iva = subtotal * IVA;
  const total = subtotal + iva;

  const rowsItems = itemsAprobados.map(it => {
    const v = (parseFloat(it.valor_pecas) || 0) + (parseFloat(it.valor_mao_obra) || 0);
    return `<div class="resumen-row"><span>${it.titulo}</span><span>€${v.toFixed(2)}</span></div>`;
  }).join('');

  document.getElementById('resumen-container').innerHTML = `
    ${rowsItems || '<div class="resumen-row"><span style="color:var(--text-muted)">Ningún servicio aprobado aún</span><span>€0.00</span></div>'}
    <div class="resumen-row"><span>Subtotal</span><span>€${subtotal.toFixed(2)}</span></div>
    <div class="resumen-row"><span>IVA (21%)</span><span>€${iva.toFixed(2)}</span></div>
    <div class="resumen-total-row">
      <span class="resumen-total-label">Total a pagar</span>
      <span class="resumen-total-valor">€${total.toFixed(2)}</span>
    </div>`;
}

function actualizarProgreso() {
  const total = items.length;
  const respondidos = Object.values(selecciones).filter(s => s.decision !== null).length;
  const pct = total > 0 ? Math.round((respondidos / total) * 100) : 0;

  document.getElementById('prog-label').textContent = `${respondidos} de ${total} elementos revisados`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('progreso-fill').style.width = pct + '%';

  const btn = document.getElementById('btn-confirmar');
  if (respondidos === total && total > 0) {
    btn.classList.remove('disabled');
    btn.classList.add('enabled');
    btn.textContent = 'Confirmar mi respuesta ✓';
    btn.disabled = false;
  } else {
    btn.classList.add('disabled');
    btn.classList.remove('enabled');
    btn.textContent = `Revisa todos los elementos (${total - respondidos} pendientes)`;
    btn.disabled = true;
  }
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function showError(msg) {
  document.getElementById('loading').innerHTML = `<p style="color:var(--red);text-align:center;padding:40px 20px;font-size:15px">${msg}</p>`;
}

init();
</script>
</body>
</html>
